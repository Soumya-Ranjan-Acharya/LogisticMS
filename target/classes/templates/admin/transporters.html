<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transporters — TruckMate Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-wrapper">
    <aside class="sidebar">
        <div class="sidebar-brand"><span class="brand-icon">🚛</span> TruckMate</div>
        <div class="sidebar-user">
            <div class="user-name" th:text="${admin.name}"></div>
            <div class="user-meta">Administrator</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
            <a href="/admin/orders" class="nav-item"><span class="nav-icon">📦</span> All Orders</a>
            <a href="/admin/drivers" class="nav-item"><span class="nav-icon">🚛</span> Drivers</a>
            <a href="/admin/transporters" class="nav-item active"><span class="nav-icon">🏢</span> Transporters</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">↩ Logout</a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar"><span class="topbar-title">Transporters</span></div>
        <div class="content-area">
            <div class="page-header">
                <h1>Registered Transporters</h1>
                <p>All companies using TruckMate to manage their shipments.</p>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Email</th>
                            <th>Member Since</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${transporters}">
                            <td><strong th:text="${t.name}">—</strong></td>
                            <td th:text="${t.companyName ?: 'N/A'}">—</td>
                            <td th:text="${t.email}">—</td>
                            <td th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy')}">—</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
