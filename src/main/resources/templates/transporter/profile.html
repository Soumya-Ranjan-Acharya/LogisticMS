<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile — TruckMate</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-wrapper">
    <aside class="sidebar">
        <div class="sidebar-brand"><span class="brand-icon">🚛</span> TruckMate</div>
        <div class="sidebar-user">
            <div class="user-name" th:text="${transporter.name}"></div>
            <div class="user-meta" th:text="${transporter.companyName ?: ''}"></div>
        </div>
        <nav class="sidebar-nav">
            <a href="/transporter/dashboard" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
            <a href="/transporter/create-order" class="nav-item"><span class="nav-icon">➕</span> Create Order</a>
            <a href="/transporter/my-orders" class="nav-item"><span class="nav-icon">📋</span> My Orders</a>
            <a href="/transporter/profile" class="nav-item active"><span class="nav-icon">👤</span> Profile</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">↩ Logout</a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar"><span class="topbar-title">My Profile</span></div>
        <div class="content-area">
            <div class="page-header">
                <h1>Profile Information</h1>
                <p>Your account details.</p>
            </div>
            <div style="max-width:500px;">
                <div class="detail-section">
                    <h3>Account Details</h3>
                    <div class="detail-row"><span class="dk">Full Name</span><span class="dv" th:text="${transporter.name}">—</span></div>
                    <div class="detail-row"><span class="dk">Email</span><span class="dv" th:text="${transporter.email}">—</span></div>
                    <div class="detail-row"><span class="dk">Company</span><span class="dv" th:text="${transporter.companyName ?: 'N/A'}">—</span></div>
                    <div class="detail-row"><span class="dk">Role</span><span class="dv"><span class="badge badge-accepted">TRANSPORTER</span></span></div>
                    <div class="detail-row"><span class="dk">Member since</span><span class="dv" th:text="${#temporals.format(transporter.createdAt, 'dd MMM yyyy')}">—</span></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
