<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drivers — TruckMate Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-wrapper">
    <aside class="sidebar">
        <div class="sidebar-brand"><span class="brand-icon">🚛</span> TruckMate</div>
        <div class="sidebar-user">
            <div class="user-name" th:text="${admin.name}"></div>
            <div class="user-meta">Administrator</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
            <a href="/admin/orders" class="nav-item"><span class="nav-icon">📦</span> All Orders</a>
            <a href="/admin/drivers" class="nav-item active"><span class="nav-icon">🚛</span> Drivers</a>
            <a href="/admin/transporters" class="nav-item"><span class="nav-icon">🏢</span> Transporters</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">↩ Logout</a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar"><span class="topbar-title">Drivers</span></div>
        <div class="content-area">
            <div class="page-header">
                <h1>Driver Fleet</h1>
                <p>All registered drivers, their priority positions, and turn status.</p>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Priority</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Vehicle</th>
                            <th>Turn Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${drivers}">
                            <td>
                                <div class="priority-number" style="width:28px;height:28px;font-size:0.8rem;"
                                     th:text="${d.priority}">1</div>
                            </td>
                            <td><strong th:text="${d.name}">—</strong></td>
                            <td th:text="${d.email}">—</td>
                            <td th:text="${d.vehicleNumber}">—</td>
                            <td>
                                <span class="badge badge-active" th:if="${d.turnActive}">🟢 Active Turn</span>
                                <span class="badge badge-waiting" th:unless="${d.turnActive}">⏳ Waiting</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
